services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cooking
      POSTGRES_PASSWORD: cooking
      POSTGRES_DB: cooking_game
    ports:
      - "5432:5432"
    volumes:
      - cooking_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cooking -d cooking_game"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cooking_postgres:
